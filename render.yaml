services:
  # Backend FastAPI chatbot API
  - type: web
    name: student-chatbot-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false  # Set this in Render dashboard (don't hardcode keys!)

  # Frontend Streamlit UI
  - type: web
    name: student-chatbot-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 10000 --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: CHATBOT_API_URL
        value: https://student-chatbot-api.onrender.com  # Update with your actual API URL